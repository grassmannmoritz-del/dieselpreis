<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="dieselpreis">
  <title>dieselpreis</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --card: #111111;
      --border: rgba(255,255,255,0.1);
      --accent: #ffffff;
      --accent2: #aaaaaa;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.35);
      --green: #ffffff;
      --red: #888888;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      position: relative;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .station-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .station-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Main price card */
    .price-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .price-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    .fuel-type {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .price-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      line-height: 1;
      letter-spacing: -1px;
      color: var(--text);
      transition: all 0.4s ease;
    }

    .price-display .currency {
      font-size: 32px;
      vertical-align: super;
      color: var(--accent);
    }

    .price-display .cents-small {
      font-size: 42px;
      color: var(--muted);
    }

    .price-loading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--muted);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .price-error {
      font-size: 14px;
      color: var(--red);
      line-height: 1.5;
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }

    .status-dot.closed { background: var(--red); animation: none; }
    .status-dot.unknown { background: var(--muted); animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .info-tile-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-tile-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .info-tile-value.good { color: var(--green); }
    .info-tile-value.bad { color: var(--red); }

    /* Refresh button */
    .refresh-btn {
      width: 100%;
      background: linear-gradient(135deg, #ffffff, #bbbbbb);
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn:active { transform: scale(0.97); opacity: 0.85; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .refresh-icon {
      font-size: 18px;
      transition: transform 0.6s ease;
    }

    .refresh-icon.spinning {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* API Key input */
    .api-setup {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .api-setup h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .api-setup p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .api-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: monospace;
      font-size: 13px;
      color: var(--text);
      width: 100%;
      outline: none;
    }

    .api-input:focus {
      border-color: rgba(255,255,255,0.5);
    }

    .api-input::placeholder {
      color: var(--muted);
    }

    .save-btn {
      background: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #000;
      cursor: pointer;
      width: 100%;
    }

    .hidden { display: none !important; }

    /* Fade in animation */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrapper">


  <!-- API Setup (shown if no key saved) -->
  <div class="api-setup fade-in" id="apiSetup">
    <h3>API Key eingeben</h3>
    <p>Gib deinen Tankerkönig API Key ein. Du bekommst ihn kostenlos auf creativecommons.tankerkoenig.de</p>
    <input class="api-input" id="apiKeyInput" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="save-btn" onclick="saveApiKey()">Speichern & Starten</button>
  </div>

  <!-- Main view (hidden until key is set) -->
  <div id="mainView" class="hidden">
    <div style="display:flex; flex-direction:column; gap:20px;">
      <!-- Price card -->
      <div class="price-card fade-in">
        <div class="fuel-type">Diesel · €/Liter</div>
        <div id="priceDisplay" class="price-loading">– – –</div>
        <div class="status-row">
          <div class="status-dot unknown" id="statusDot"></div>
          <div class="status-text" id="statusText">Wird geladen…</div>
        </div>
      </div>

      <!-- Info tiles -->
      <div class="info-grid fade-in">
        <div class="info-tile">
          <div class="info-tile-label">Zuletzt aktualisiert</div>
          <div class="info-tile-value" id="lastUpdate">–</div>
        </div>
        <div class="info-tile">
          <div class="info-tile-label">Status</div>
          <div class="info-tile-value" id="stationStatus">–</div>
        </div>
      </div>

      <!-- Refresh button -->
      <button class="refresh-btn fade-in" id="refreshBtn" onclick="fetchPrice()">
        <span class="refresh-icon" id="refreshIcon">↻</span>
        Preis aktualisieren
      </button>

      <div class="footer fade-in">
        Daten: Tankerkönig · MTS-K Bundeskartellamt<br>
        <span style="opacity:0.5; cursor:pointer;" onclick="resetKey()">API Key ändern</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ── KONFIGURATION ─────────────────────────────────────────────
  // Station ID der Aral Lochhausen — wird beim ersten Start automatisch gesucht
  // Falls du sie manuell setzen willst, trag sie hier ein:
  let STATION_ID = localStorage.getItem('stationId') || null;
  const STATION_SEARCH_LAT = 48.1747;
  const STATION_SEARCH_LNG = 11.4269;
  const STATION_SEARCH_RAD = 2;
  // ─────────────────────────────────────────────────────────────

  let apiKey = localStorage.getItem('tankerkoenigKey') || '';

  function init() {
    if (apiKey) {
      document.getElementById('apiSetup').classList.add('hidden');
      document.getElementById('mainView').classList.remove('hidden');
      fetchPrice();
    }
  }

  function saveApiKey() {
    const input = document.getElementById('apiKeyInput').value.trim();
    if (!input || input.length < 10) {
      alert('Bitte einen gültigen API Key eingeben.');
      return;
    }
    apiKey = input;
    localStorage.setItem('tankerkoenigKey', apiKey);
    document.getElementById('apiSetup').classList.add('hidden');
    document.getElementById('mainView').classList.remove('hidden');
    fetchPrice();
  }

  function resetKey() {
    localStorage.removeItem('tankerkoenigKey');
    localStorage.removeItem('stationId');
    apiKey = '';
    STATION_ID = null;
    document.getElementById('apiSetup').classList.remove('hidden');
    document.getElementById('mainView').classList.add('hidden');
  }

  async function findStation() {
    const url = `https://creativecommons.tankerkoenig.de/json/list.php?lat=${STATION_SEARCH_LAT}&lng=${STATION_SEARCH_LNG}&rad=${STATION_SEARCH_RAD}&type=diesel&sort=dist&apikey=${apiKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.ok || !data.stations || data.stations.length === 0) {
      throw new Error('Keine Tankstellen gefunden.');
    }
    // Suche nach Aral
    const aral = data.stations.find(s =>
      s.brand && s.brand.toLowerCase().includes('aral')
    ) || data.stations[0];
    STATION_ID = aral.id;
    localStorage.setItem('stationId', STATION_ID);
    return aral;
  }

  async function fetchPrice() {
    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = true;
    icon.classList.add('spinning');
    setLoading();

    try {
      // Station ID suchen falls noch nicht bekannt
      if (!STATION_ID) {
        await findStation();
      }

      const url = `https://creativecommons.tankerkoenig.de/json/prices.php?ids=${STATION_ID}&apikey=${apiKey}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.ok) throw new Error(data.message || 'API Fehler');

      const station = data.prices[STATION_ID];
      if (!station) throw new Error('Tankstelle nicht gefunden.');

      const price = station.diesel;
      const isOpen = station.status === 'open';

      // Preis anzeigen
      if (price && price !== false) {
        const priceStr = price.toFixed(3);
        const [euros, cents] = priceStr.split('.');
        document.getElementById('priceDisplay').innerHTML =
          `<span class="currency">€</span>${euros}<span class="cents-small">.${cents}</span>`;
        document.getElementById('priceDisplay').className = 'price-display fade-in';
      } else {
        document.getElementById('priceDisplay').innerHTML = 'Kein Preis';
        document.getElementById('priceDisplay').className = 'price-display';
      }

      // Status
      const dot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      if (isOpen) {
        dot.className = 'status-dot';
        statusText.textContent = 'Jetzt geöffnet';
        document.getElementById('stationStatus').textContent = 'Offen';
        document.getElementById('stationStatus').className = 'info-tile-value good';
      } else {
        dot.className = 'status-dot closed';
        statusText.textContent = 'Derzeit geschlossen';
        document.getElementById('stationStatus').textContent = 'Geschlossen';
        document.getElementById('stationStatus').className = 'info-tile-value bad';
      }

      // Uhrzeit
      const now = new Date();
      document.getElementById('lastUpdate').textContent =
        now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

    } catch (err) {
      document.getElementById('priceDisplay').innerHTML =
        `<div class="price-error">Fehler beim Laden.<br>${err.message}</div>`;
      document.getElementById('statusText').textContent = 'Fehler';
      document.getElementById('statusDot').className = 'status-dot unknown';
    }

    btn.disabled = false;
    icon.classList.remove('spinning');
  }

  function setLoading() {
    document.getElementById('priceDisplay').innerHTML = '– – –';
    document.getElementById('priceDisplay').className = 'price-loading';
    document.getElementById('statusText').textContent = 'Wird geladen…';
    document.getElementById('statusDot').className = 'status-dot unknown';
  }

  // Auto-refresh alle 5 Minuten
  setInterval(() => {
    if (apiKey && document.visibilityState === 'visible') fetchPrice();
  }, 5 * 60 * 1000);

  init();
</script>
</body>
</html>
